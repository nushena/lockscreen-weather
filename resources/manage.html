<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>锁屏管理</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link rel="icon" href="data:," />
  </head>
  <body class="manage-page">
    <main class="manage-shell">
      <section class="manage-panel" aria-labelledby="manageTitle">
        <header class="manage-header">
          <div>
            <p class="manage-kicker">锁屏配置</p>
            <h1 id="manageTitle" class="manage-title">天气查询管理页</h1>
            <p class="manage-summary">
              这里保存主页面天气接口的查询参数。adcode 优先级最高，city
              支持中文和英文；两者都不填时按客户端 IP 自动定位。
            </p>
          </div>
        </header>

        <form id="manageForm" class="manage-form">
          <label class="manage-field" for="adcode">
            <span class="manage-label">adcode</span>
            <input
              id="adcode"
              name="adcode"
              class="manage-input"
              inputmode="numeric"
              autocomplete="off"
              placeholder="例如 210100"
            />
            <span class="manage-help">按行政区编码查询，优先级最高。</span>
          </label>

          <label class="manage-field" for="city">
            <span class="manage-label">city</span>
            <input
              id="city"
              name="city"
              class="manage-input"
              autocomplete="off"
              placeholder="例如 北京 / Tokyo"
            />
            <span class="manage-help">支持中文和英文城市名。</span>
          </label>

          <div class="manage-actions">
            <button class="manage-button manage-button-primary" type="submit">
              保存配置
            </button>
            <button class="manage-button" type="button" id="clearButton">
              清空配置
            </button>
          </div>
        </form>

        <section class="manage-divider" aria-hidden="true"></section>

        <section class="manage-panel-block" aria-labelledby="backgroundTitle">
          <h2 id="backgroundTitle" class="manage-subtitle">背景设置</h2>

          <div class="manage-field">
            <div class="manage-label">背景模式</div>
            <div class="manage-radio-group" role="radiogroup" aria-label="背景模式">
              <label class="manage-radio">
                <input type="radio" name="bgMode" value="black" />
                <span>默认黑色</span>
              </label>
              <label class="manage-radio">
                <input type="radio" name="bgMode" value="api-random" />
                <span>API 随机壁纸</span>
              </label>
              <label class="manage-radio">
                <input type="radio" name="bgMode" value="custom" />
                <span>自定义壁纸</span>
              </label>
            </div>
          </div>

          <div id="bgApiBlock" class="manage-panel-subblock">
            <label class="manage-field" for="bgApiUrl">
              <span class="manage-label">随机壁纸 API 地址</span>
              <input
                id="bgApiUrl"
                name="bgApiUrl"
                class="manage-input"
                autocomplete="off"
                placeholder="例如 https://picsum.photos/1920/1080"
              />
              <span class="manage-help">用于随机壁纸模式；地址应直接返回图片内容。</span>
            </label>
          </div>

          <div id="bgCustomBlock" class="manage-panel-subblock">
            <div class="manage-actions">
              <button class="manage-button" type="button" id="bgPickButton">
                选择本地图片
              </button>
              <input
                id="bgFileInput"
                type="file"
                accept="image/*"
                class="manage-file-input"
              />
            </div>

            <div class="manage-field">
              <div class="manage-label">历史壁纸</div>
              <div id="bgHistory" class="bg-history" aria-label="历史壁纸列表"></div>
              <div id="bgHistoryEmpty" class="manage-help" hidden>
                暂无历史壁纸。
              </div>
            </div>
          </div>

          <p id="bgStatus" class="manage-status" role="status" aria-live="polite"></p>
        </section>

        <p class="manage-rule">
          接口查询顺序：adcode → city → IP 自动定位。lang 默认 zh。
        </p>
        <p
          id="manageStatus"
          class="manage-status"
          role="status"
          aria-live="polite"
        ></p>
      </section>
    </main>

    <script src="./neutralino.js"></script>
    <script type="module" src="./assets/neutralino-entry.js"></script>
    <script type="module" src="./assets/manage.js"></script>
  </body>
</html>
